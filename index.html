<!DOCTYPE html>
<html>
<head>
    <title>Wendu Portfolio</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(to right, #d9e8ff, #ffffff);
        }

        .container {
            max-width: 700px;
            margin: 60px auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            padding: 30px;
            text-align: center;
        }

        h1 {
            color: #1a237e;
            margin-bottom: 5px;
        }

        .title {
            color: gray;
            margin-bottom: 20px;
        }

        img {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            margin: 15px 0;
            border: 4px solid #1a237e;
        }

        .section {
            text-align: left;
            margin-top: 25px;
        }

        .section h3 {
            color: #1a237e;
            border-left: 5px solid #1a237e;
            padding-left: 10px;
        }

        .skills span {
            display: inline-block;
            background: #1a237e;
            color: white;
            padding: 5px 10px;
            margin: 5px;
            border-radius: 6px;
            font-size: 14px;
        }

        button {
            margin-top: 25px;
            background: #1a237e;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 15px;
        }

        button:hover {
            background: #0d124d;
        }

        footer {
            margin-top: 20px;
            font-size: 13px;
            color: gray;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>Wendu Kebede</h1>
    <div class="title">Medical Student | Future Developer 🚀</div>

    <img src="https://via.placeholder.com/130">

    <div class="section">
        <h3>📚 Education</h3>
        <p>Medical Student (PC Level)</p>
    </div>

    <div class="section skills">
        <h3>💡 Skills</h3>
        <span>HTML</span>
        <span>CSS</span>
        <span>JavaScript</span>
    </div>

    <div class="section">
        <h3>🎯 Goal</h3>
        <p>Become a Doctor + Software Engineer</p>
    </div>

    <button onclick="showMessage()">Hire Me</button>

    <footer>
        © 2026 Wendu Portfolio
    </footer>

</div>

<script>
function showMessage(){
    alert("Thanks! I will contact you soon 🚀");
}
</script>

</body>
</html>
